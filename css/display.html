<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display prop</title>
    <style>
        div{
         background-color: aqua;
         display: inline-block;
         padding: 50px;
        }
        a{
            display: block;
         text-align: center;
         background-color: blue;
        }
        p{
         background-color: red;
        }
    </style>
</head>
<body>
    <div>nitin</div>
    <a>Hello css</a>
    <div>Html file</div>
    <p>new file</p>
</body>
</html>
